<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整句口說練習 · Vito</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a212b;
    --surface-2: #232c38;
    --border: #2e3a48;
    --text: #e8edf2;
    --text-dim: #9aa7b4;
    --accent: #4a9eff;
    --accent-dim: #2d6bb3;
    --green: #36c47a;
    --green-dim: #1f7a4d;
    --red: #ff6b6b;
    --red-dim: #b33d3d;
    --amber: #f5b545;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Microsoft JhengHei", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 720px; margin: 0 auto; padding: 20px 18px 80px; min-height: 100%; }
  h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .3px; }
  h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    transition: transform .08s ease, background .15s ease, opacity .15s ease;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent); color: #fff; padding: 14px 22px; font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) { background: #5aa8ff; }
  .btn-ghost {
    background: var(--surface-2); color: var(--text); padding: 11px 18px; border: 1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled) { background: #2a3542; }
  .btn-green { background: var(--green); color: #042; padding: 12px 18px; font-weight: 600; }
  .btn-red { background: var(--red); color: #300; padding: 12px 18px; font-weight: 600; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .center { text-align: center; }
  .dim { color: var(--text-dim); }
  .small { font-size: .85rem; }
  .pill {
    display: inline-block; padding: 3px 11px; border-radius: 999px;
    font-size: .78rem; font-weight: 600; background: var(--surface-2); color: var(--text-dim);
  }

  /* Top bar */
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .nav { display: flex; gap: 6px; }
  .nav button {
    background: transparent; color: var(--text-dim); padding: 8px 13px; font-size: .9rem; border-radius: 8px;
  }
  .nav button.active { background: var(--surface-2); color: var(--text); }

  /* Home stats */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 12px; text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1.1; }
  .stat-label { font-size: .8rem; color: var(--text-dim); margin-top: 4px; }

  .cat-list { display: grid; gap: 10px; margin-top: 8px; }
  .cat-item {
    display: flex; justify-content: space-between; align-items: center; text-align: left;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; color: var(--text); width: 100%;
  }
  .cat-item:hover { background: var(--surface-2); }
  .cat-item .cat-meta { font-size: .82rem; color: var(--text-dim); }

  /* Practice */
  .progress-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .progressbar { height: 5px; background: var(--surface-2); border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
  .progressbar > div { height: 100%; background: var(--accent); transition: width .3s ease; }

  .steps-ind { display: flex; gap: 8px; margin-bottom: 18px; }
  .steps-ind .s {
    flex: 1; height: 6px; border-radius: 999px; background: var(--surface-2);
  }
  .steps-ind .s.done { background: var(--green); }
  .steps-ind .s.cur { background: var(--accent); }

  .step-title { font-size: .85rem; color: var(--accent); font-weight: 700; letter-spacing: .5px; margin-bottom: 10px; text-transform: uppercase; }

  .vocab-item {
    display: flex; align-items: center; gap: 12px; padding: 13px 14px;
    background: var(--surface-2); border-radius: 10px; margin-bottom: 9px; cursor: pointer;
    border: 1px solid transparent;
  }
  .vocab-item:hover { border-color: var(--accent-dim); }
  .vocab-word { font-weight: 700; font-size: 1.08rem; }
  .vocab-ipa { color: var(--text-dim); font-size: .9rem; font-style: italic; }
  .vocab-zh { color: var(--text-dim); margin-left: auto; text-align: right; }
  .speaker { color: var(--accent); font-size: 1.2rem; }

  .zh-prompt { font-size: 1.5rem; font-weight: 600; text-align: center; padding: 24px 10px; line-height: 1.5; }
  .en-answer { font-size: 1.35rem; font-weight: 600; text-align: center; padding: 18px 10px; line-height: 1.5; color: var(--green); }

  .mic-wrap { text-align: center; padding: 16px 0; }
  .mic-btn {
    width: 92px; height: 92px; border-radius: 50%; background: var(--accent); color: #fff;
    font-size: 2.2rem; display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(74,158,255,.4);
  }
  .mic-btn.recording { background: var(--red); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.5);} 50%{ box-shadow: 0 0 0 16px rgba(255,107,107,0);} }

  .diff-line { font-size: 1.3rem; font-weight: 600; text-align: center; padding: 16px 8px; line-height: 1.7; }
  .diff-line .hit { color: var(--green); }
  .diff-line .miss { color: var(--red); text-decoration: underline; text-decoration-style: wavy; }

  .accuracy { font-size: 2.4rem; font-weight: 800; text-align: center; }
  .accuracy.pass { color: var(--green); }
  .accuracy.fail { color: var(--red); }

  .heard { background: var(--surface-2); border-radius: 10px; padding: 10px 14px; color: var(--text-dim); font-size: .95rem; text-align: center; margin: 8px 0; }

  .var-item { background: var(--surface-2); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .var-swap { font-size: .8rem; color: var(--amber); font-weight: 600; margin-bottom: 6px; }
  .var-en { font-size: 1.15rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .var-note { font-size: .82rem; color: var(--text-dim); margin-top: 5px; }

  /* Stats screen */
  .box-bar { display: flex; align-items: flex-end; gap: 10px; height: 140px; margin: 18px 0; padding: 0 6px; }
  .box-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; justify-content: flex-end; height: 100%; }
  .box-col .bar { width: 100%; background: var(--accent-dim); border-radius: 6px 6px 0 0; min-height: 4px; transition: height .4s ease; display:flex; align-items:flex-start; justify-content:center; color:#fff; font-weight:700; font-size:.8rem; padding-top:4px; }
  .box-col .lbl { font-size: .78rem; color: var(--text-dim); }

  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .toggle-group { display: flex; gap: 6px; }
  .toggle-group button { background: var(--surface-2); color: var(--text-dim); padding: 8px 14px; font-size: .9rem; }
  .toggle-group button.sel { background: var(--accent); color: #fff; }

  .banner { padding: 12px 16px; border-radius: 10px; font-size: .9rem; margin-bottom: 16px; }
  .banner.warn { background: rgba(245,181,69,.15); border: 1px solid var(--amber); color: var(--amber); }
  .banner.info { background: rgba(74,158,255,.12); border: 1px solid var(--accent-dim); color: var(--accent); }

  .hidden { display: none !important; }
  .mt { margin-top: 16px; }
  .mb { margin-bottom: 16px; }
  .gap-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
</style>
</head>

/* =========================================================================
   日期工具 (以本地日期 YYYY-MM-DD 為單位)
   ========================================================================= */
function todayStr() {
  const d = new Date();
  return ymd(d);
}
function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function addDays(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + n);
  return ymd(dt);
}
function dayDiff(a, b) {
  // a - b in days (both YYYY-MM-DD)
  const [ay, am, ad] = a.split("-").map(Number);
  const [by, bm, bd] = b.split("-").map(Number);
  const da = new Date(ay, am - 1, ad);
  const db = new Date(by, bm - 1, bd);
  return Math.round((da - db) / 86400000);
}

/* =========================================================================
   儲存層
   ========================================================================= */
let storageOK = true;
function checkStorage() {
  try {
    const t = "__t";
    localStorage.setItem(t, "1");
    localStorage.removeItem(t);
    return true;
  } catch (e) {
    return false;
  }
}

function defaultState() {
  const cards = {};
  const today = todayStr();
  UNITS.forEach(u => {
    cards[u.id] = { box: 1, nextDue: today, lastReviewed: null, correctCount: 0, wrongCount: 0 };
  });
  return {
    cards,
    stats: { streak: 0, lastStudyDate: null, todayCount: 0, totalReviews: 0 },
    settings: { ttsRate: 0.85 }
  };
}

function loadState() {
  if (!storageOK) return defaultState();
  let raw;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { return defaultState(); }
  if (!raw) {
    const s = defaultState();
    saveState(s);
    return s;
  }
  let s;
  try { s = JSON.parse(raw); } catch (e) { s = defaultState(); }
  // 確保結構完整 & 為新句庫補上未練過的卡 (連續性)
  if (!s.cards) s.cards = {};
  if (!s.stats) s.stats = { streak: 0, lastStudyDate: null, todayCount: 0, totalReviews: 0 };
  if (!s.settings) s.settings = { ttsRate: 0.85 };
  const today = todayStr();
  UNITS.forEach(u => {
    if (!s.cards[u.id]) {
      s.cards[u.id] = { box: 1, nextDue: today, lastReviewed: null, correctCount: 0, wrongCount: 0 };
    }
  });
  // 跨日重置 todayCount
  if (s.stats.lastStudyDate !== today) s.stats.todayCount = 0;
  return s;
}

function saveState(s) {
  if (!storageOK) return;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
}

/* =========================================================================
   SRS 引擎
   ========================================================================= */
function getUnit(id) { return UNITS.find(u => u.id === id); }

function dueQueue(state, categoryFilter) {
  const today = todayStr();
  let ids = Object.keys(state.cards).filter(id => getUnit(id));
  if (categoryFilter) ids = ids.filter(id => getUnit(id).category === categoryFilter);
  const due = ids.filter(id => dayDiff(state.cards[id].nextDue, today) <= 0);
  // 依 box 由小到大 (不熟先練)，box 同則依到期早的先
  due.sort((a, b) => {
    const ca = state.cards[a], cb = state.cards[b];
    if (ca.box !== cb.box) return ca.box - cb.box;
    return dayDiff(ca.nextDue, cb.nextDue);
  });
  return due;
}

// 借出最接近到期的卡 (用於「往前多練」或按類別但全到期完成)
function borrowAhead(state, categoryFilter, excludeIds, n) {
  const today = todayStr();
  let ids = Object.keys(state.cards).filter(id => getUnit(id));
  if (categoryFilter) ids = ids.filter(id => getUnit(id).category === categoryFilter);
  ids = ids.filter(id => !excludeIds.includes(id));
  ids.sort((a, b) => dayDiff(state.cards[a].nextDue, today) - dayDiff(state.cards[b].nextDue, today));
  return ids.slice(0, n);
}

function applyResult(state, id, correct) {
  const card = state.cards[id];
  const today = todayStr();
  if (correct) {
    card.box = Math.min(5, card.box + 1);
    card.correctCount++;
  } else {
    card.box = 1;
    card.wrongCount++;
  }
  card.nextDue = addDays(today, BOX_INTERVALS[card.box]);
  card.lastReviewed = today;

  // 統計
  updateStreak(state, today);
  state.stats.todayCount++;
  state.stats.totalReviews++;
  saveState(state);
}

function updateStreak(state, today) {
  const last = state.stats.lastStudyDate;
  if (last === today) {
    // 同日：streak 與 todayCount 不變
  } else {
    if (last && dayDiff(today, last) === 1) state.stats.streak++;
    else state.stats.streak = 1;
    state.stats.todayCount = 0; // 新的一天，歸零後再累加
  }
  state.stats.lastStudyDate = today;
}

/* =========================================================================
   語音層
   ========================================================================= */
const TTS = {
  voice: null,
  init() {
    if (!("speechSynthesis" in window)) return;
    const pick = () => {
      const voices = speechSynthesis.getVoices();
      this.voice = voices.find(v => v.lang === "en-US" && /Google|Samantha|Microsoft/i.test(v.name))
        || voices.find(v => v.lang === "en-US")
        || voices.find(v => v.lang && v.lang.startsWith("en"))
        || null;
    };
    pick();
    speechSynthesis.onvoiceschanged = pick;
  },
  speak(text) {
    if (!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    if (this.voice) u.voice = this.voice;
    u.rate = (App.state && App.state.settings.ttsRate) || 0.85;
    speechSynthesis.speak(u);
  },
  stop() { if ("speechSynthesis" in window) speechSynthesis.cancel(); }
};

function sttSupported() {
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

/* 正規化 + 逐字比對 */
function normalizeWords(s) {
  return s.toLowerCase()
    .replace(/[’']/g, "'")
    .replace(/[^a-z0-9'\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .split(" ")
    .filter(Boolean);
}

function compareTranscript(target, heard) {
  const tWords = normalizeWords(target);
  const hWords = normalizeWords(heard);
  const hPool = hWords.slice();
  const marks = tWords.map(w => {
    const idx = hPool.indexOf(w);
    if (idx !== -1) { hPool.splice(idx, 1); return { word: w, hit: true }; }
    return { word: w, hit: false };
  });
  const matched = marks.filter(m => m.hit).length;
  const total = tWords.length || 1;
  return { marks, matched, total, accuracy: matched / total };
}

/* =========================================================================
   App / Router
   ========================================================================= */
const App = {
  state: null,
  el: null,
  route: "home",
  // practice session
  session: null,

  init() {
    storageOK = checkStorage();
    this.state = loadState();
    this.el = document.getElementById("app");
    TTS.init();
    this.render();
  },

  go(route) { this.route = route; this.session = null; TTS.stop(); this.render(); },

  render() {
    TTS.stop();
    if (this.route === "home") this.renderHome();
    else if (this.route === "practice") this.renderPractice();
    else if (this.route === "stats") this.renderStats();
    else if (this.route === "settings") this.renderSettings();
  },

  topbar(active) {
    const nav = (r, label) =>
      `<button class="${active === r ? "active" : ""}" data-nav="${r}">${label}</button>`;
    return `
      <div class="topbar">
        <h1>💬 整句口說</h1>
        <div class="nav">
          ${nav("home", "首頁")}
          ${nav("stats", "統計")}
          ${nav("settings", "設定")}
        </div>
      </div>`;
  },

  bindNav() {
    this.el.querySelectorAll("[data-nav]").forEach(b => {
      b.onclick = () => this.go(b.dataset.nav);
    });
  },

  /* ---------- 首頁 ---------- */
  renderHome() {
    const s = this.state;
    const today = todayStr();
    const dueAll = dueQueue(s);
    const storageWarn = !storageOK
      ? `<div class="banner warn">⚠️ 偵測到瀏覽器無法使用本機儲存（可能是無痕模式）。本次仍可練習，但<strong>進度不會被保存</strong>。</div>` : "";

    const catItems = CATEGORIES.map(c => {
      const due = dueQueue(s, c.code).length;
      const total = UNITS.filter(u => u.category === c.code).length;
      return `<button class="cat-item" data-cat="${c.code}">
        <div>
          <div style="font-weight:600">${c.name}</div>
          <div class="cat-meta">共 ${total} 句　•　今日到期 ${due} 句</div>
        </div>
        <span class="pill">${due > 0 ? due + " 待練" : "✓"}</span>
      </button>`;
    }).join("");

    this.el.innerHTML = `
      ${this.topbar("home")}
      ${storageWarn}
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num">${dueAll.length}</div><div class="stat-label">今日待複習</div></div>
        <div class="stat-box"><div class="stat-num">${s.stats.streak}</div><div class="stat-label">連續天數 🔥</div></div>
        <div class="stat-box"><div class="stat-num">${s.stats.todayCount}</div><div class="stat-label">今日已練</div></div>
      </div>
      <div class="card center">
        ${dueAll.length > 0
          ? `<p class="dim mb">${dueAll.length} 張卡等你開口。不熟的會排前面。</p>
             <button class="btn-primary" id="startBtn" style="font-size:1.15rem;padding:16px 36px">▶ 開始今日複習</button>`
          : `<p style="font-size:1.1rem;margin-bottom:6px">🎉 今天的複習完成了！</p>
             <p class="dim mb">要不要往前多練幾張？（會照常更新排程）</p>
             <button class="btn-ghost" id="aheadBtn">往前多練 5 張</button>`
        }
      </div>
      <div class="mt">
        <h2>按類別練習</h2>
        <div class="cat-list">${catItems}</div>
      </div>
    `;
    this.bindNav();
    const startBtn = this.el.querySelector("#startBtn");
    if (startBtn) startBtn.onclick = () => this.startSession(dueAll, null);
    const aheadBtn = this.el.querySelector("#aheadBtn");
    if (aheadBtn) aheadBtn.onclick = () => {
      const ids = borrowAhead(s, null, [], 5);
      if (ids.length) this.startSession(ids, null);
    };
    this.el.querySelectorAll("[data-cat]").forEach(b => {
      b.onclick = () => {
        const cat = b.dataset.cat;
        let ids = dueQueue(s, cat);
        if (!ids.length) ids = borrowAhead(s, cat, [], 5);
        if (ids.length) this.startSession(ids, cat);
        else alert("這個類別沒有可練的卡。");
      };
    });
  },

  /* ---------- 練習 session ---------- */
  startSession(ids, cat) {
    if (!ids || !ids.length) return;
    this.session = { ids: ids.slice(), idx: 0, cat, results: [] };
    this.route = "practice";
    this.renderPractice();
  },

  renderPractice() {
    const sess = this.session;
    if (!sess) { this.go("home"); return; }
    if (sess.idx >= sess.ids.length) { this.renderSessionDone(); return; }

    const id = sess.ids[sess.idx];
    const unit = getUnit(id);
    // 每張卡的步驟狀態
    if (!sess.step) sess.step = { n: 1, micState: "idle", result: null };
    const stepN = sess.step.n;
    const progress = ((sess.idx) / sess.ids.length) * 100;

    const stepInd = [1, 2, 3, 4].map(n => {
      const cls = n < stepN ? "done" : (n === stepN ? "cur" : "");
      return `<div class="s ${cls}"></div>`;
    }).join("");

    let body = "";
    if (stepN === 1) body = this.stepVocab(unit);
    else if (stepN === 2) body = this.stepSentence(unit);
    else if (stepN === 3) body = this.stepSpeak(unit);
    else if (stepN === 4) body = this.stepVariations(unit);

    this.el.innerHTML = `
      <div class="progress-head">
        <button class="btn-ghost" style="padding:7px 14px" id="quitBtn">← 離開</button>
        <span class="dim small">第 ${sess.idx + 1} / ${sess.ids.length} 張　•　Box ${this.state.cards[id].box}</span>
      </div>
      <div class="progressbar"><div style="width:${progress}%"></div></div>
      <div class="steps-ind">${stepInd}</div>
      <div class="card">${body}</div>
    `;
    this.el.querySelector("#quitBtn").onclick = () => {
      if (confirm("離開練習？本張未判定的進度不會保存，已判定的會保留。")) this.go("home");
    };
    this.bindStep(unit);
  },

  // ① 生字預習
  stepVocab(unit) {
    const items = unit.vocab.map((v, i) => `
      <div class="vocab-item" data-vocab="${i}">
        <span class="speaker">🔊</span>
        <div>
          <span class="vocab-word">${v.word}</span>
          ${v.ipa ? `<span class="vocab-ipa">　${v.ipa}</span>` : ""}
        </div>
        <span class="vocab-zh">${v.zh}</span>
      </div>`).join("");
    return `
      <div class="step-title">① 生字預習</div>
      <p class="dim small mb">點任一生字可聽發音。</p>
      ${items}
      <div class="center mt">
        <button class="btn-primary" id="step1next">我認得了 →</button>
      </div>`;
  },

  // ② 整句記憶
  stepSentence(unit) {
    const revealed = this.session.step.revealed;
    return `
      <div class="step-title">② 整句記憶</div>
      <p class="dim small center mb">看著中文，心裡先回想英文，再看答案。</p>
      <div class="zh-prompt">${unit.zh}</div>
      ${revealed
        ? `<div class="en-answer">${unit.en} <span class="speaker" id="replayEn" style="cursor:pointer">🔊</span></div>
           <div class="center mt"><button class="btn-primary" id="step2next">下一步：開口 →</button></div>`
        : `<div class="center"><button class="btn-primary" id="revealBtn">看答案</button></div>`
      }`;
  },

  // ③ 開口比對
  stepSpeak(unit) {
    const st = this.session.step;
    const micAllowed = sttSupported();
    let resultBlock = "";
    if (st.result) {
      const r = st.result;
      const pass = r.accuracy >= PASS_THRESHOLD;
      const diff = r.marks.map(m =>
        `<span class="${m.hit ? "hit" : "miss"}">${m.word}</span>`).join(" ");
      resultBlock = `
        <div class="diff-line">${diff}</div>
        ${r.heard ? `<div class="heard">機器聽到：「${r.heard}」</div>` : ""}
        <div class="accuracy ${pass ? "pass" : "fail"}">${Math.round(r.accuracy * 100)}%</div>
        <p class="center dim small">門檻 ${Math.round(PASS_THRESHOLD * 100)}%　•　${pass ? "判定：對 ✓" : "判定：錯 ✗"}</p>
        <div class="gap-btns">
          <button class="btn-green" id="markRight">算我對</button>
          <button class="btn-red" id="markWrong">算我錯</button>
        </div>
        <div class="center mt"><button class="btn-ghost" id="retryMic">🎤 重錄</button></div>
      `;
    }

    const selfMode = st.selfMode || !micAllowed;
    return `
      <div class="step-title">③ 開口比對（核心）</div>
      <p class="dim small center mb">念出這句英文。
        ${micAllowed ? "（語音辨識需連網）" : "<span style='color:var(--amber)'>此瀏覽器不支援語音辨識，已切換為自評模式。</span>"}
      </p>
      <div class="en-answer" style="font-size:1.2rem;color:var(--text)">${unit.en}
        <span class="speaker" id="playTarget" style="cursor:pointer">🔊</span></div>

      ${selfMode && !st.result ? `
        <div class="banner info">自評模式：自己念完後，用下方按鈕誠實判定。</div>
        <div class="gap-btns">
          <button class="btn-green" id="markRight">算我對</button>
          <button class="btn-red" id="markWrong">算我錯</button>
        </div>
      ` : ""}

      ${!selfMode ? `
        <div class="mic-wrap">
          <button class="mic-btn ${st.micState === "recording" ? "recording" : ""}" id="micBtn">
            ${st.micState === "recording" ? "■" : "🎤"}
          </button>
          <p class="dim small mt">${st.micMsg || "點麥克風開始錄音"}</p>
        </div>
      ` : ""}

      ${resultBlock}
    `;
  },

  // ④ 變化練習
  stepVariations(unit) {
    const items = unit.variations.map((v, i) => `
      <div class="var-item">
        <div class="var-swap">🔀 ${v.swap}　·　${v.note}</div>
        <div class="var-en">${v.en} <span class="speaker" data-varspk="${i}" style="cursor:pointer">🔊</span></div>
      </div>`).join("");
    return `
      <div class="step-title">④ 變化練習</div>
      <p class="dim small mb">跟著念念看更高階／更道地的講法（不計分，純練口腔）。</p>
      ${items}
      <div class="center mt">
        <button class="btn-primary" id="finishCard">完成這張卡 ✓</button>
      </div>`;
  },

  bindStep(unit) {
    const st = this.session.step;
    const $ = sel => this.el.querySelector(sel);

    // step 1
    this.el.querySelectorAll("[data-vocab]").forEach(elm => {
      elm.onclick = () => TTS.speak(unit.vocab[elm.dataset.vocab].word);
    });
    if ($("#step1next")) $("#step1next").onclick = () => { st.n = 2; st.revealed = false; this.renderPractice(); };

    // step 2
    if ($("#revealBtn")) $("#revealBtn").onclick = () => { st.revealed = true; this.renderPractice(); TTS.speak(unit.en); };
    if ($("#replayEn")) $("#replayEn").onclick = () => TTS.speak(unit.en);
    if ($("#step2next")) $("#step2next").onclick = () => { st.n = 3; st.micState = "idle"; st.micMsg = ""; this.renderPractice(); };

    // step 3
    if ($("#playTarget")) $("#playTarget").onclick = () => TTS.speak(unit.en);
    if ($("#micBtn")) $("#micBtn").onclick = () => this.toggleMic(unit);
    if ($("#retryMic")) $("#retryMic").onclick = () => { st.result = null; st.micState = "idle"; st.micMsg = ""; this.renderPractice(); };
    if ($("#markRight")) $("#markRight").onclick = () => this.judge(unit, true);
    if ($("#markWrong")) $("#markWrong").onclick = () => this.judge(unit, false);

    // step 4
    this.el.querySelectorAll("[data-varspk]").forEach(elm => {
      elm.onclick = () => TTS.speak(unit.variations[elm.dataset.varspk].en);
    });
    if ($("#finishCard")) $("#finishCard").onclick = () => this.nextCard();
  },

  toggleMic(unit) {
    const st = this.session.step;
    if (st.micState === "recording") { if (this._rec) this._rec.stop(); return; }
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Rec) { st.selfMode = true; this.renderPractice(); return; }
    const rec = new Rec();
    this._rec = rec;
    rec.lang = "en-US";
    rec.continuous = false;
    rec.interimResults = false;
    rec.maxAlternatives = 1;

    let got = false;
    st.micState = "recording";
    st.micMsg = "聽你說…（念完會自動停）";
    this.renderPractice();

    // 8 秒逾時
    const timeout = setTimeout(() => {
      if (!got) { try { rec.stop(); } catch (e) {} st._timedOut = true; }
    }, 8000);

    rec.onresult = (e) => {
      got = true;
      clearTimeout(timeout);
      const heard = e.results[0][0].transcript;
      const cmp = compareTranscript(unit.en, heard);
      cmp.heard = heard;
      st.result = cmp;
      st.micState = "idle";
      st.micMsg = "";
      this.renderPractice();
    };
    rec.onerror = (e) => {
      clearTimeout(timeout);
      st.micState = "idle";
      if (e.error === "not-allowed" || e.error === "service-not-allowed") {
        st.selfMode = true;
        st.micMsg = "";
        alert("麥克風權限被拒，已切換為自評模式。你可以自己念，再用「算我對／算我錯」判定。");
      } else if (e.error === "no-speech") {
        st.micMsg = "沒聽清楚，再試一次。";
      } else {
        st.micMsg = "辨識出錯（" + e.error + "），可重錄或改用自評。";
        st.selfMode = false;
      }
      this.renderPractice();
    };
    rec.onend = () => {
      clearTimeout(timeout);
      if (!got && st.micState === "recording") {
        st.micState = "idle";
        st.micMsg = st._timedOut ? "沒聽清楚，再試一次（或用自評）。" : "沒收到語音，再試一次。";
        st._timedOut = false;
        // 逾時/無回傳時給自評退路
        st.selfMode = false;
        this.renderPractice();
      }
    };
    try { rec.start(); } catch (e) {
      st.micState = "idle"; st.micMsg = "無法啟動麥克風。"; this.renderPractice();
    }
  },

  judge(unit, correct) {
    const id = unit.id;
    applyResult(this.state, id, correct);
    this.session.results.push({ id, correct });
    // 判定完成 → 進入 ④ 變化練習
    this.session.step.judged = correct;
    this.session.step.n = 4;
    this.renderPractice();
  },

  nextCard() {
    this.session.idx++;
    this.session.step = null;
    if (this.session.idx >= this.session.ids.length) this.renderSessionDone();
    else this.renderPractice();
  },

  renderSessionDone() {
    const res = this.session.results;
    const right = res.filter(r => r.correct).length;
    const total = res.length;
    this.el.innerHTML = `
      ${this.topbar("home")}
      <div class="card center">
        <p style="font-size:2.4rem">🎯</p>
        <h2 style="margin-bottom:8px">這輪練習完成！</h2>
        <p class="dim mb">判定結果：${right} / ${total} 對</p>
        <div class="gap-btns">
          <button class="btn-primary" data-nav="home">回首頁</button>
          <button class="btn-ghost" id="moreBtn">再多練 5 張</button>
        </div>
      </div>`;
    this.bindNav();
    const moreBtn = this.el.querySelector("#moreBtn");
    moreBtn.onclick = () => {
      const exclude = this.session.ids.slice();
      let ids = dueQueue(this.state).filter(id => !exclude.includes(id));
      if (!ids.length) ids = borrowAhead(this.state, this.session.cat, exclude, 5);
      if (ids.length) this.startSession(ids, this.session.cat);
      else { alert("沒有更多卡可練了。"); this.go("home"); }
    };
  },

  /* ---------- 統計 ---------- */
  renderStats() {
    const s = this.state;
    const boxCounts = [0, 0, 0, 0, 0]; // box 1..5
    Object.keys(s.cards).forEach(id => {
      if (!getUnit(id)) return;
      const b = s.cards[id].box;
      if (b >= 1 && b <= 5) boxCounts[b - 1]++;
    });
    const maxCount = Math.max(1, ...boxCounts);
    const bars = boxCounts.map((c, i) => {
      const h = (c / maxCount) * 100;
      return `<div class="box-col">
        <div class="bar" style="height:${Math.max(c ? 14 : 0, h)}%">${c || ""}</div>
        <div class="lbl">Box ${i + 1}</div>
      </div>`;
    }).join("");

    const catBreak = CATEGORIES.map(c => {
      const total = UNITS.filter(u => u.category === c.code).length;
      const mastered = UNITS.filter(u => u.category === c.code && s.cards[u.id] && s.cards[u.id].box >= 4).length;
      return `<div class="setting-row">
        <span>${c.name}</span>
        <span class="dim">${mastered}/${total} 進入熟練區 (Box 4-5)</span>
      </div>`;
    }).join("");

    this.el.innerHTML = `
      ${this.topbar("stats")}
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num">${UNITS.length}</div><div class="stat-label">總句數</div></div>
        <div class="stat-box"><div class="stat-num">${s.stats.streak}</div><div class="stat-label">連續天數 🔥</div></div>
        <div class="stat-box"><div class="stat-num">${s.stats.totalReviews}</div><div class="stat-label">累積複習</div></div>
      </div>
      <div class="card mb">
        <h2>熟練分布（Leitner 盒子）</h2>
        <p class="dim small">盒子越右越熟，間隔越長。</p>
        <div class="box-bar">${bars}</div>
      </div>
      <div class="card">
        <h2>各類別進度</h2>
        ${catBreak}
      </div>
    `;
    this.bindNav();
  },

  /* ---------- 設定 ---------- */
  renderSettings() {
    const s = this.state;
    const rate = s.settings.ttsRate;
    this.el.innerHTML = `
      ${this.topbar("settings")}
      <div class="card mb">
        <h2>朗讀語速 (TTS)</h2>
        <div class="setting-row">
          <span class="dim">選擇朗讀速度</span>
          <div class="toggle-group">
            <button data-rate="0.7" class="${rate <= 0.75 ? "sel" : ""}">慢速</button>
            <button data-rate="0.85" class="${rate > 0.75 && rate < 0.95 ? "sel" : ""}">略慢</button>
            <button data-rate="1.0" class="${rate >= 0.95 ? "sel" : ""}">正常</button>
          </div>
        </div>
        <div class="center mt">
          <button class="btn-ghost" id="testTts">🔊 試聽</button>
        </div>
      </div>
      <div class="card">
        <h2>進度</h2>
        <div class="setting-row">
          <span class="dim">清除所有學習進度與統計<br><span class="small">（句庫不受影響，此動作無法復原）</span></span>
          <button class="btn-red" id="clearBtn">清除進度</button>
        </div>
        ${!storageOK ? `<div class="banner warn mt">目前無法使用本機儲存，進度未被保存。</div>` : ""}
      </div>
    `;
    this.bindNav();
    this.el.querySelectorAll("[data-rate]").forEach(b => {
      b.onclick = () => {
        s.settings.ttsRate = parseFloat(b.dataset.rate);
        saveState(s);
        this.renderSettings();
      };
    });
    this.el.querySelector("#testTts").onclick = () =>
      TTS.speak("Can you do better on the price if I take the whole parcel?");
    this.el.querySelector("#clearBtn").onclick = () => {
      if (confirm("確定要清除所有進度與統計嗎？此動作無法復原。")) {
        if (confirm("再確認一次：所有 box、連續天數、複習紀錄都會歸零。")) {
          this.state = defaultState();
          saveState(this.state);
          alert("進度已清除。");
          this.go("home");
        }
      }
    };
  }
};

window.addEventListener("DOMContentLoaded", () => App.init());
</script>
</body>
</html>
